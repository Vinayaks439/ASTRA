apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: frontend-ingress
  namespace: astra
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    # Replace with your actual domain or remove host for IP-based access
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
  # Uncomment for TLS (requires cert-manager or manual secret)
  # tls:
  #   - hosts:
  #       - astra.example.com
  #     secretName: astra-tls
