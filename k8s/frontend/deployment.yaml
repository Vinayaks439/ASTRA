apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: astra
  labels:
    app: frontend
    app.kubernetes.io/part-of: astra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          # Replace with your ACR login server
          image: REPLACE_ACR_LOGIN_SERVER/astra-frontend:latest
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
