apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: astra-keyvault
  namespace: astra
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    # Replace with the AKS kubelet identity client ID from terraform output
    userAssignedIdentityID: "REPLACE_WITH_KUBELET_IDENTITY_CLIENT_ID"
    # Replace with your Key Vault name
    keyvaultName: "kv-astra-dev"
    objects: |
      array:
        - |
          objectName: cosmos-endpoint
          objectType: secret
        - |
          objectName: cosmos-key
          objectType: secret
    # Replace with your Azure tenant ID
    tenantId: "REPLACE_WITH_TENANT_ID"
  secretObjects:
    - secretName: astra-secrets
      type: Opaque
      data:
        - objectName: cosmos-endpoint
          key: COSMOS_ENDPOINT
        - objectName: cosmos-key
          key: COSMOS_KEY
