syntax = "proto3";
package astra.v1;

option go_package = "github.com/astra/backend/gen/astra/v1;astrav1";

import "google/api/annotations.proto";

service SettingsService {
  rpc GetSettings(GetSettingsRequest) returns (Settings) {
    option (google.api.http) = { get: "/api/v1/settings" };
  }
  rpc UpdateSettings(UpdateSettingsRequest) returns (Settings) {
    option (google.api.http) = { put: "/api/v1/settings" body: "*" };
  }
  rpc GetThresholds(GetThresholdsRequest) returns (Thresholds) {
    option (google.api.http) = { get: "/api/v1/thresholds" };
  }
  rpc UpdateThresholds(UpdateThresholdsRequest) returns (Thresholds) {
    option (google.api.http) = { put: "/api/v1/thresholds" body: "*" };
  }
  rpc ResetDefaults(ResetDefaultsRequest) returns (Settings) {
    option (google.api.http) = { post: "/api/v1/settings/reset" };
  }
}

message Thresholds {
  double price_gap = 1;
  double stock_coverage = 2;
  double demand_trend = 3;
  double margin_proximity = 4;
}

message Settings {
  string user_id = 1;
  Thresholds thresholds = 2;
  bool po_recommendations_enabled = 3;
  bool whatsapp_enabled = 4;
  string whatsapp_number = 5;
  string theme = 6;
}

message GetSettingsRequest {
  string user_id = 1;
}

message UpdateSettingsRequest {
  string user_id = 1;
  bool po_recommendations_enabled = 2;
  bool whatsapp_enabled = 3;
  string whatsapp_number = 4;
  string theme = 5;
}

message GetThresholdsRequest {
  string user_id = 1;
}

message UpdateThresholdsRequest {
  string user_id = 1;
  Thresholds thresholds = 2;
}

message ResetDefaultsRequest {
  string user_id = 1;
}
