name: Deploy Agents

on:
  push:
    branches: [main]
    paths: ['agents/**']
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ vars.AKS_RESOURCE_GROUP }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        agent:
          - name: risk-assessment
          - name: recommendation
          - name: exception-triage
          - name: rationale
          - name: insights
          - name: notification
          - name: competitor-puller
          - name: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Build and Push Agent Image
        run: |
          IMAGE_TAG=${{ env.ACR_LOGIN_SERVER }}/astra-agent-${{ matrix.agent.name }}:${{ github.sha }}
          IMAGE_LATEST=${{ env.ACR_LOGIN_SERVER }}/astra-agent-${{ matrix.agent.name }}:latest
          docker buildx build \
            --target ${{ matrix.agent.name }} \
            --tag $IMAGE_TAG \
            --tag $IMAGE_LATEST \
            --push \
            -f agents/Dockerfile \
            agents/

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name ca-astra-${{ matrix.agent.name }}-dev \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/astra-agent-${{ matrix.agent.name }}:${{ github.sha }}
